---
- name: Provision k3s VMs on Proxmox nodes
  hosts: proxmox_nodes
  become: true

  vars:
    vm_template_id: 9000
    vm_memory: 4096      # MB
    vm_cores: 4
    vm_disk: "32G"
    vm_os_storage: "local-lvm"
    ubuntu_iso: "local:iso/ubuntu-22.04.5-live-server-amd64.iso"
    source_node: "rhou-pc-msi"
    source_iso_path: "/var/lib/vz/template/iso/ubuntu-22.04.5-live-server-amd64.iso"

  tasks:
    - name: Copy Ubuntu ISO from rhou-pc-msi to remote node
      when: inventory_hostname != source_node
      command: >
        scp root@{{ hostvars[source_node]['ansible_host'] }}:{{ source_iso_path }}
        /var/lib/vz/template/iso/ubuntu-22.04.5-live-server-amd64.iso
      args:
        creates: /var/lib/vz/template/iso/ubuntu-22.04.5-live-server-amd64.iso

    - name: Create VM template from cloud image
      command: >
        qm create {{ vm_template_id }}
        --name ubuntu-template
        --memory {{ vm_memory }}
        --cores {{ vm_cores }}
        --net0 virtio,bridge={{ proxmox_bridge }}
        --cdrom {{ ubuntu_iso }}
      ignore_errors: true  # skip if template already exists

    - name: Add disk to template
      command: >
        qm set {{ vm_template_id }}
        --scsi0 {{ proxmox_storage }}:{{ vm_disk }},iothread=1
      ignore_errors: true

    - name: Set boot order for template
      command: >
        qm set {{ vm_template_id }}
        --boot order=scsi0;ide2
      ignore_errors: true

    - name: Enable QEMU guest agent on template
      command: >
        qm set {{ vm_template_id }}
        --agent enabled=1
      ignore_errors: true

    - name: Convert to template
      command: qm template {{ vm_template_id }}
      ignore_errors: true

    - name: Clone VM from template for k3s node
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: root@pam
        api_password: "{{ proxmox_api_password }}"  # store in ansible vault
        clone: ubuntu-template
        name: "k3s-{{ inventory_hostname }}"
        node: "{{ inventory_hostname }}"
        storage: "{{ proxmox_storage }}"
        memory: "{{ vm_memory }}"
        cores: "{{ vm_cores }}"
        onboot: true
        state: present
