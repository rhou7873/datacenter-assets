---
- name: Install k3s server (control plane)
  hosts: k3s_server
  become: true

  tasks:
    - name: Install k3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -s - server \
          --disable traefik \
          --write-kubeconfig-mode 644
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        state: present
        timeout: 60

    - name: Fetch node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Set token fact for agents
      set_fact:
        k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"

- name: Install k3s agents (worker nodes)
  hosts: k3s_agents
  become: true

  tasks:
    - name: Install k3s agent
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} \
          K3S_URL=https://{{ k3s_server_ip }}:6443 \
          K3S_TOKEN={{ hostvars[groups['k3s_server'][0]]['k3s_node_token'] }} \
          sh -
      args:
        creates: /usr/local/bin/k3s
